<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 번호 랜덤 생성기</title>
  <style>
    :root {
      --bg-top: #f4efe6;
      --bg-bottom: #d9e6f2;
      --ink: #18222d;
      --muted: #5b6773;
      --panel: rgba(255, 255, 255, 0.78);
      --line: rgba(24, 34, 45, 0.1);
      --accent: #d96c28;
      --accent-dark: #b5531b;
      --shadow: 0 18px 50px rgba(24, 34, 45, 0.12);
      --yellow: #f1c84a;
      --blue: #5e9ee6;
      --red: #ea6b66;
      --gray: #8c97a2;
      --green: #6dbd71;
      --hero-overlay: linear-gradient(120deg, rgba(217, 108, 40, 0.12), rgba(94, 158, 230, 0.14)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.25));
      --field-bg: rgba(255, 255, 255, 0.82);
      --secondary-bg: rgba(255, 255, 255, 0.76);
      --card-bg: rgba(255, 255, 255, 0.7);
      --eyebrow-bg: rgba(24, 34, 45, 0.06);
      --border-strong: rgba(255, 255, 255, 0.5);
    }

    body[data-theme="dark"] {
      --bg-top: #0f1720;
      --bg-bottom: #1e2937;
      --ink: #e7edf3;
      --muted: #a8b4c0;
      --panel: rgba(15, 23, 32, 0.76);
      --line: rgba(231, 237, 243, 0.12);
      --accent: #ff8d4d;
      --accent-dark: #ec7230;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      --hero-overlay: linear-gradient(120deg, rgba(255, 141, 77, 0.15), rgba(94, 158, 230, 0.16)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      --field-bg: rgba(15, 23, 32, 0.72);
      --secondary-bg: rgba(15, 23, 32, 0.64);
      --card-bg: rgba(15, 23, 32, 0.66);
      --eyebrow-bg: rgba(231, 237, 243, 0.08);
      --border-strong: rgba(231, 237, 243, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 28%),
        radial-gradient(circle at bottom right, rgba(217, 108, 40, 0.18), transparent 22%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(920px, 100%);
      background: var(--panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-strong);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 40px 32px 28px;
      background: var(--hero-overlay);
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--eyebrow-bg);
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: clamp(32px, 6vw, 56px);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0;
      max-width: 600px;
      font-size: 17px;
      line-height: 1.6;
      color: var(--muted);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 14px;
      padding: 28px 32px 8px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 14px;
      color: var(--muted);
    }

    select,
    button {
      font: inherit;
      border-radius: 16px;
      border: 1px solid transparent;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    select {
      width: 100%;
      padding: 14px 16px;
      border-color: var(--line);
      background: var(--field-bg);
      color: var(--ink);
      outline: none;
    }

    select:focus {
      border-color: rgba(94, 158, 230, 0.65);
      box-shadow: 0 0 0 4px rgba(94, 158, 230, 0.14);
    }

    button {
      padding: 14px 20px;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
    }

    .primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 12px 24px rgba(217, 108, 40, 0.28);
    }

    .secondary {
      background: var(--secondary-bg);
      border-color: var(--line);
      color: var(--ink);
    }

    .theme-toggle {
      min-width: 124px;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .results {
      display: grid;
      gap: 16px;
      padding: 24px 32px 32px;
    }

    .result-card {
      display: grid;
      gap: 16px;
      padding: 20px;
      background: var(--card-bg);
      border: 1px solid rgba(24, 34, 45, 0.08);
      border-radius: 24px;
      transform: translateY(8px);
      opacity: 0;
      animation: rise 0.45s ease forwards;
    }

    .result-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .result-title {
      margin: 0;
      font-size: 18px;
    }

    .timestamp {
      font-size: 13px;
      color: var(--muted);
    }

    .balls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .plus {
      font-size: 24px;
      color: var(--muted);
      padding: 0 4px;
    }

    .ball {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      box-shadow: inset 0 -7px 12px rgba(0, 0, 0, 0.12);
    }

    .range-yellow { background: var(--yellow); }
    .range-blue { background: var(--blue); }
    .range-red { background: var(--red); }
    .range-gray { background: var(--gray); }
    .range-green { background: var(--green); }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      padding: 0 32px 32px;
      color: var(--muted);
      font-size: 13px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }

    .empty {
      padding: 28px 32px 36px;
      color: var(--muted);
      font-size: 16px;
    }

    @keyframes rise {
      from {
        transform: translateY(8px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 720px) {
      .hero,
      .controls,
      .results,
      .legend,
      .empty {
        padding-left: 20px;
        padding-right: 20px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .ball {
        width: 48px;
        height: 48px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <span class="eyebrow">Lucky Draw Studio</span>
      <h1>로또 번호 랜덤 생성기</h1>
      <p class="subtitle">1부터 45까지 중복 없이 6개 번호와 보너스 번호를 즉시 생성합니다. 한 번에 여러 세트를 뽑아서 비교할 수 있습니다.</p>
    </section>

    <section class="controls">
      <div class="field">
        <label for="setCount">생성할 세트 수</label>
        <select id="setCount">
          <option value="1">1세트</option>
          <option value="3" selected>3세트</option>
          <option value="5">5세트</option>
          <option value="10">10세트</option>
        </select>
      </div>
      <button class="secondary theme-toggle" id="themeButton">다크 모드</button>
      <button class="primary" id="generateButton">번호 생성</button>
      <button class="secondary" id="resetButton">초기화</button>
    </section>

    <section class="results" id="results"></section>

    <div class="empty" id="emptyState">아직 생성된 번호가 없습니다. `번호 생성`을 눌러 시작하세요.</div>

    <section class="legend">
      <span class="legend-item"><span class="legend-dot range-yellow"></span>1 - 10</span>
      <span class="legend-item"><span class="legend-dot range-blue"></span>11 - 20</span>
      <span class="legend-item"><span class="legend-dot range-red"></span>21 - 30</span>
      <span class="legend-item"><span class="legend-dot range-gray"></span>31 - 40</span>
      <span class="legend-item"><span class="legend-dot range-green"></span>41 - 45</span>
    </section>
  </main>

  <script>
    const resultsElement = document.getElementById("results");
    const emptyStateElement = document.getElementById("emptyState");
    const setCountElement = document.getElementById("setCount");
    const themeButton = document.getElementById("themeButton");
    const generateButton = document.getElementById("generateButton");
    const resetButton = document.getElementById("resetButton");
    const themeStorageKey = "lotto-theme";

    function updateThemeButton(theme) {
      themeButton.textContent = theme === "dark" ? "화이트 모드" : "다크 모드";
    }

    function applyTheme(theme) {
      document.body.dataset.theme = theme;
      updateThemeButton(theme);
      localStorage.setItem(themeStorageKey, theme);
    }

    function toggleTheme() {
      const nextTheme = document.body.dataset.theme === "dark" ? "light" : "dark";
      applyTheme(nextTheme);
    }

    function initializeTheme() {
      const savedTheme = localStorage.getItem(themeStorageKey);
      const preferredDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const initialTheme = savedTheme || (preferredDark ? "dark" : "light");
      applyTheme(initialTheme);
    }

    function shuffle(numbers) {
      const list = [...numbers];

      for (let index = list.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [list[index], list[randomIndex]] = [list[randomIndex], list[index]];
      }

      return list;
    }

    function createSet() {
      const source = Array.from({ length: 45 }, (_, index) => index + 1);
      const shuffled = shuffle(source);
      const mainNumbers = shuffled.slice(0, 6).sort((left, right) => left - right);
      const bonusNumber = shuffled[6];

      return { mainNumbers, bonusNumber };
    }

    function getRangeClass(number) {
      if (number <= 10) return "range-yellow";
      if (number <= 20) return "range-blue";
      if (number <= 30) return "range-red";
      if (number <= 40) return "range-gray";
      return "range-green";
    }

    function createBall(number) {
      const ball = document.createElement("span");
      ball.className = `ball ${getRangeClass(number)}`;
      ball.textContent = String(number);
      return ball;
    }

    function formatTime() {
      return new Intl.DateTimeFormat("ko-KR", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(new Date());
    }

    function renderSets() {
      const setCount = Number(setCountElement.value);
      resultsElement.innerHTML = "";

      for (let setIndex = 0; setIndex < setCount; setIndex += 1) {
        const { mainNumbers, bonusNumber } = createSet();
        const card = document.createElement("article");
        card.className = "result-card";
        card.style.animationDelay = `${setIndex * 90}ms`;

        const top = document.createElement("div");
        top.className = "result-top";

        const title = document.createElement("h2");
        title.className = "result-title";
        title.textContent = `${setIndex + 1}번 세트`;

        const timestamp = document.createElement("span");
        timestamp.className = "timestamp";
        timestamp.textContent = formatTime();

        top.append(title, timestamp);

        const balls = document.createElement("div");
        balls.className = "balls";

        mainNumbers.forEach((number) => {
          balls.append(createBall(number));
        });

        const plus = document.createElement("span");
        plus.className = "plus";
        plus.textContent = "+";

        balls.append(plus, createBall(bonusNumber));
        card.append(top, balls);
        resultsElement.append(card);
      }

      emptyStateElement.hidden = true;
    }

    function resetSets() {
      resultsElement.innerHTML = "";
      emptyStateElement.hidden = false;
    }

    generateButton.addEventListener("click", renderSets);
    resetButton.addEventListener("click", resetSets);
    themeButton.addEventListener("click", toggleTheme);

    initializeTheme();
    renderSets();
  </script>
</body>
</html>
